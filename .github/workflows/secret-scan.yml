name: Secret Scan

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scanner
        run: pip install .
      - name: Run secret scan
        run: secrethawk . --json-out artifacts/secret-report.json --fail-on high
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-report
          path: artifacts/secret-report.json
